<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a1a2e;
      --card:        #16213e;
      --accent:      #0f3460;
      --accent-hi:   #1a5276;
      --border:      #1e3a5f;
      --text:        #e0e6f0;
      --text-dim:    #7f8fa6;
      --green:       #27ae60;
      --blue:        #2980b9;
      --red:         #c0392b;
      --grey:        #5d6d7e;
      --indigo:      #4a5bc7;
      --purple:      #8e44ad;
      --orange:      #d35400;
      --font:        'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono:        'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--accent);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .5px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #27ae60;
      box-shadow: 0 0 8px #27ae60;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      transition: filter .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:hover  { filter: brightness(1.15); }

    .btn-primary  { background: #27ae60; color: #fff; }
    .btn-danger   { background: var(--red); color: #fff; }
    .btn-ghost    { background: rgba(255,255,255,.08); color: var(--text); }
    .btn-events   { background: var(--accent-hi); color: var(--text); }
    .btn-events.active { background: #1a5276; outline: 1px solid #2980b9; }

    .btn-chat     { background: rgba(39,174,96,.2); color: #2ecc71; border: 1px solid rgba(39,174,96,.3); }
    .btn-chat.active { background: rgba(39,174,96,.3); outline: 1px solid #27ae60; }

    .btn-dismiss  { background: rgba(255,255,255,.06); color: var(--text-dim); padding: 4px 10px; font-size: 13px; }

    /* ── Main content ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .agent-count {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--accent);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ── Agent list ── */
    #agent-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .agent-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .agent-card:hover { border-color: var(--accent-hi); }

    .agent-row {
      display: grid;
      grid-template-columns: minmax(200px,1fr) 120px 110px 130px auto;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
    }

    .agent-id {
      font-family: var(--mono);
      font-size: 13px;
      color: #a8d8ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-meta {
      color: var(--text-dim);
      font-size: 12px;
    }

    .agent-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }

    .badge-active    { background: rgba(39,174,96,.2);  color: #2ecc71; border: 1px solid rgba(39,174,96,.4); }
    .badge-completed { background: rgba(41,128,185,.2); color: #5dade2; border: 1px solid rgba(41,128,185,.4); }
    .badge-failed    { background: rgba(192,57,43,.2);  color: #e74c3c; border: 1px solid rgba(192,57,43,.4); }
    .badge-pending   { background: rgba(93,109,126,.2); color: #95a5a6; border: 1px solid rgba(93,109,126,.4); }

    .src-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }
    .src-ORCHESTRATOR { background: rgba(74,91,199,.25); color: #7b8fe8; border: 1px solid rgba(74,91,199,.4); }
    .src-OPERATOR     { background: rgba(142,68,173,.25); color: #bb8fce; border: 1px solid rgba(142,68,173,.4); }
    .src-REGISTRY     { background: rgba(39,174,96,.25); color: #58d68d; border: 1px solid rgba(39,174,96,.4); }
    .src-AGENT        { background: rgba(211,84,0,.25);  color: #f0a500; border: 1px solid rgba(211,84,0,.4); }

    /* ── Event panel ── */
    .event-panel {
      border-top: 1px solid var(--border);
      padding: 14px 18px;
      background: rgba(0,0,0,.2);
    }

    .event-panel-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .event-item {
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid transparent;
      transition: border-color .15s;
    }
    .event-item:hover { border-color: var(--border); }

    .event-item details > summary {
      display: grid;
      grid-template-columns: 16px 75px 120px 1fr;
      align-items: center;
      gap: 12px;
      padding: 7px 10px;
      cursor: pointer;
      border-radius: 6px;
      list-style: none;
      transition: background .15s;
    }
    .event-item details > summary::-webkit-details-marker { display: none; }
    .event-item details > summary:hover { background: rgba(255,255,255,.04); }
    .event-item details[open] > summary { background: rgba(255,255,255,.06); }

    .event-ts {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .event-type {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }

    /* ── Neutral event-type accents ── */
    .event-item.evt-tool     { border-left: 3px solid var(--indigo); }
    .event-item.evt-model    { border-left: 3px solid var(--purple); }
    .event-item.evt-thinking { border-left: 3px solid var(--text-dim); }
    .event-item.evt-error    { border-left: 3px solid var(--red); }
    .event-item.evt-run      { border-left: 3px solid var(--green); }
    .event-item.evt-compact  { border-left: 3px solid var(--orange); }
    .event-item.evt-log      { border-left: 3px solid var(--grey); }

    .event-icon {
      font-size: 12px;
      width: 16px;
      text-align: center;
      flex: 0 0 auto;
    }
    .event-item.evt-tool     .event-type { color: #9aa6ee; }
    .event-item.evt-model    .event-type { color: #bb8fce; }
    .event-item.evt-thinking .event-type { color: var(--text-dim); }
    .event-item.evt-error    .event-type { color: #e74c3c; }
    .event-item.evt-run      .event-type { color: #58d68d; }
    .event-item.evt-compact  .event-type { color: #f0a500; }
    .event-item.evt-log      .event-type { color: var(--text-dim); }

    /* ── Staleness / last-activity indicator ── */
    .agent-stale {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .agent-stale:empty { display: none; }
    .agent-stale.warn { color: var(--orange); font-weight: 600; }

    .event-payload {
      margin: 0 10px 8px 10px;
      padding: 10px 14px;
      background: rgba(0,0,0,.3);
      border-radius: 6px;
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: #8bc4e8;
      white-space: pre;
      overflow-x: auto;
      line-height: 1.6;
    }

    .no-events {
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      padding: 16px 0;
    }

    /* ── Live logs ── */
    .logs-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(39,174,96,.06);
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
      transition: background .15s, border-color .15s;
      user-select: none;
    }
    .logs-entry:hover { background: rgba(39,174,96,.12); border-color: var(--accent-hi); }
    .logs-entry .logs-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      flex: 0 0 auto;
    }
    .logs-entry.live .logs-dot {
      box-shadow: 0 0 6px var(--green);
      animation: logs-pulse 1.4s ease-in-out infinite;
    }
    .logs-entry:not(.live) .logs-dot { background: var(--grey); }
    .logs-entry .logs-label {
      font-family: var(--mono);
      letter-spacing: .3px;
    }
    .logs-entry .logs-chevron { margin-left: auto; color: var(--text-dim); font-size: 11px; }

    @keyframes logs-pulse {
      0%   { opacity: 1;   transform: scale(1); }
      50%  { opacity: .35; transform: scale(.75); }
      100% { opacity: 1;   transform: scale(1); }
    }

    .logs-subpanel {
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(0,0,0,.25);
      overflow: hidden;
    }
    .logs-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    .logs-seg {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .logs-seg button {
      background: rgba(255,255,255,.04);
      color: var(--text-dim);
      border: none;
      padding: 4px 12px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .logs-seg button + button { border-left: 1px solid var(--border); }
    .logs-seg button.active { background: var(--accent-hi); color: var(--text); }
    .logs-status {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .logs-status.streaming { color: #2ecc71; }
    .logs-status.ended { color: var(--text-dim); }
    .logs-pre {
      margin: 0;
      padding: 10px 14px;
      max-height: 280px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: #8bc4e8;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }
    .logs-pre .logs-waiting { color: var(--text-dim); font-style: italic; }

    /* ── Chat panel ── */
    .chat-panel {
      border-top: 1px solid var(--border);
      padding: 14px 18px;
      background: rgba(0,0,0,.2);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-panel-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }
    .chat-log {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }
    .chat-msg {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 80%;
    }
    .chat-msg.user {
      background: rgba(41,128,185,.2);
      border: 1px solid rgba(41,128,185,.3);
      color: #a8d8ff;
      align-self: flex-end;
    }
    .chat-msg.agent {
      background: rgba(39,174,96,.1);
      border: 1px solid rgba(39,174,96,.2);
      color: var(--text);
      align-self: flex-start;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    .chat-input-row input {
      flex: 1;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .chat-input-row input:focus { border-color: #27ae60; }
    .chat-input-row input:disabled { opacity: .5; }
    .chat-input-row button:disabled { opacity: .5; cursor: not-allowed; }

    /* ── "Agent is typing" indicator ── */
    .chat-msg.typing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 10px 12px;
    }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2ecc71;
      opacity: .35;
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .30s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0);   opacity: .35; }
      30%           { transform: translateY(-4px); opacity: 1;   }
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: .4;
    }
    .empty-state p { font-size: 15px; }
    .empty-state small { font-size: 12px; margin-top: 6px; display: block; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      animation: slide-in .2s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 22px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #2980b9;
    }
    .form-group select { cursor: pointer; color-scheme: dark; }
    .form-group select option { background: #16213e; color: #e0e6f0; }
    .form-group textarea {
      min-height: 70px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e3a5f;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      z-index: 300;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Children section ── */
    .children-section {
      margin: 0 18px 14px;
      padding-left: 20px;
      border-left: 2px solid var(--border);
    }
    .children-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-top: 4px;
    }
    .child-card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .child-card:last-child { margin-bottom: 0; }
    .child-card .agent-row {
      padding: 10px 14px;
      grid-template-columns: minmax(160px,1fr) 100px 90px auto;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent-hi); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Agent Platform</h1>
  <button class="btn btn-primary" id="open-modal-btn">+ New Agent</button>
</header>

<main>
  <div class="section-header">
    <span class="section-title">Running Agents</span>
    <span class="agent-count" id="agent-count">0 agents</span>
  </div>
  <div id="agent-list"></div>
</main>

<!-- Spawn modal -->
<div class="modal-overlay" id="spawn-modal">
  <div class="modal">
    <h2>Spawn New Agent</h2>
    <div class="form-group">
      <label>Agent Type</label>
      <select id="f-type">
        <option value="worker">worker</option>
      </select>
    </div>
    <div class="form-group">
      <label>User ID</label>
      <input id="f-user" type="text" value="user-1" placeholder="user-1" />
    </div>
    <div class="form-group">
      <label>Tenant ID</label>
      <input id="f-tenant" type="text" value="tenant-1" placeholder="tenant-1" />
    </div>
    <div class="form-group">
      <label>Task</label>
      <textarea id="f-task" placeholder="Describe the task…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="close-modal-btn">Cancel</button>
      <button class="btn btn-primary" id="spawn-btn">Spawn</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  'use strict';

  const POLL_MS = 2000;

  let agentEventPollers  = {};   // agentId -> intervalId
  let expandedAgents     = new Set();
  let renderedEventCount = {};   // agentId -> number of events already in the DOM

  let expandedChats = new Set();
  let chatHistory   = {};

  let agentStatus = {};          // agentId -> latest known status string
  let logPollers  = {};          // agentId -> intervalId
  let logState    = {};          // agentId -> { container, lastTs, open }

  let lastEventAt = {};          // agentId -> ms epoch of newest known event
  const STALE_MS  = 30000;       // threshold after which a non-terminal agent is flagged stale

  const TERMINAL = ['completed', 'failed', 'killed'];
  function isTerminalStatus(s) { return TERMINAL.includes((s || '').toLowerCase()); }

  // ── API helpers ──────────────────────────────────────────────────────────

  async function fetchAgents() {
    try { const r = await fetch('/api/agents'); return r.ok ? r.json() : []; }
    catch { return []; }
  }

  async function fetchEvents(id) {
    try { const r = await fetch(`/api/agents/${id}/events`); return r.ok ? r.json() : []; }
    catch { return []; }
  }

  async function fetchLogs(id, container, sinceTime) {
    const params = new URLSearchParams();
    if (container) params.set('container', container);
    if (sinceTime) params.set('sinceTime', sinceTime);
    else params.set('tailLines', '500');
    try {
      const r = await fetch(`/api/agents/${id}/logs?${params.toString()}`);
      return r.ok ? r.json() : null;
    } catch { return null; }
  }

  async function spawnAgent(data) {
    const r = await fetch('/api/spawn', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function killAgent(id) {
    const r = await fetch(`/api/agents/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error(await r.text());
  }

  async function dismissAgent(id) {
    const r = await fetch(`/api/agents/${id}/dismiss`, { method: 'POST' });
    if (!r.ok) throw new Error(await r.text());
  }

  async function fetchTemplates() {
    try { const r = await fetch('/api/templates'); return r.ok ? r.json() : []; }
    catch { return []; }
  }

  async function sendMessage(agentId, message) {
    const r = await fetch(`/api/agents/${agentId}/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, sessionId: agentId }),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  // ── Badge helpers ────────────────────────────────────────────────────────

  function statusBadge(status) {
    const s = (status || 'pending').toLowerCase();
    const cls = {active:'badge-active', completed:'badge-completed', failed:'badge-failed'}[s] || 'badge-pending';
    return `<span class="badge ${cls}">${s}</span>`;
  }

  function sourceBadge(source) {
    const s = (source || '').toUpperCase();
    return `<span class="src-badge src-${s}">${s}</span>`;
  }

  function fmtTime(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return isNaN(d) ? ts.slice(0,8) : d.toLocaleTimeString('en-GB', {hour12:false});
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Neutral event-type taxonomy → visual treatment ───────────────────────
  // Keyed off the neutral semantic `type` only — never framework-specific names.
  // Unknown types fall through to the default look (empty class / no icon).

  function eventTypeClass(type) {
    switch ((type || '').toLowerCase()) {
      case 'tool_start':
      case 'tool_end':   return 'evt-tool';
      case 'model_turn': return 'evt-model';
      case 'thinking':   return 'evt-thinking';
      case 'error':      return 'evt-error';
      case 'run_start':
      case 'run_end':    return 'evt-run';
      case 'compaction': return 'evt-compact';
      case 'log':        return 'evt-log';
      default:           return '';
    }
  }

  function eventTypeIcon(type) {
    switch ((type || '').toLowerCase()) {
      case 'tool_start':
      case 'tool_end':   return '🔧';
      case 'model_turn': return '🧠';
      case 'thinking':   return '💭';
      case 'error':      return '⚠';
      case 'run_start':  return '▶';
      case 'run_end':    return '■';
      case 'compaction': return '🗜';
      case 'log':        return '·';
      default:           return '';
    }
  }

  // ── Staleness ("last activity") ──────────────────────────────────────────

  function fmtAgo(ts) {
    if (!ts) return '';
    const secs = Math.max(0, Math.floor((Date.now() - ts) / 1000));
    if (secs < 60)   return `${secs}s ago`;
    const mins = Math.floor(secs / 60);
    if (mins < 60)   return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)    return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  // Recompute every staleness node from lastEventAt vs now, without rebuilding
  // cards. Driven by a 1s interval so the "Xs ago" text stays live.
  function refreshStaleness() {
    const nodes = document.querySelectorAll('.agent-stale');
    for (const el of nodes) {
      const id = el.getAttribute('data-agent');
      if (!id) continue;
      if (isTerminalStatus(agentStatus[id])) {
        el.textContent = '';
        el.classList.remove('warn');
        continue;
      }
      const ts = lastEventAt[id];
      if (!ts) { el.textContent = ''; el.classList.remove('warn'); continue; }
      el.textContent = `last activity ${fmtAgo(ts)}`;
      el.classList.toggle('warn', (Date.now() - ts) > STALE_MS);
    }
  }

  // ── Build a child agent card (no kill button, no chat) ──────────────────

  function buildChildCard(a) {
    const card = document.createElement('div');
    card.className = 'child-card';
    card.id = `card-${a.agentId}`;
    const isTerminal = ['completed','failed','killed'].includes((a.status||'').toLowerCase());
    card.innerHTML = `
      <div class="agent-row">
        <span class="agent-id">${escHtml(a.agentId)}</span>
        <span class="agent-meta">${escHtml(a.agentType || '—')}</span>
        <span class="status-wrap">${statusBadge(a.status)}</span>
        <div class="agent-actions">
          <span class="agent-stale" data-agent="${a.agentId}" id="stale-${a.agentId}"></span>
          <button class="btn btn-events" id="evtbtn-${a.agentId}"
                  onclick="toggleEvents('${a.agentId}')">▼ Events</button>
          <span id="dismisswrap-${a.agentId}">
            ${isTerminal ? `<button class="btn btn-dismiss" onclick="handleDismiss('${a.agentId}')">✕</button>` : ''}
          </span>
        </div>
      </div>`;
    return card;
  }

  // ── Insert/update children inside a parent card ──────────────────────────

  function updateChildrenSection(parentId, childAgents) {
    if (childAgents.length === 0) return;
    const parentCard = document.getElementById(`card-${parentId}`);
    if (!parentCard) return;

    let section = document.getElementById(`children-${parentId}`);
    if (!section) {
      section = document.createElement('div');
      section.className = 'children-section';
      section.id = `children-${parentId}`;
      section.innerHTML = '<div class="children-label">Child Agents</div>';
      parentCard.appendChild(section);
    }

    for (const child of childAgents) {
      const existing = document.getElementById(`card-${child.agentId}`);
      if (!existing) {
        section.appendChild(buildChildCard(child));
      } else {
        const sw = existing.querySelector('.status-wrap');
        if (sw) sw.innerHTML = statusBadge(child.status);
        const dw = document.getElementById(`dismisswrap-${child.agentId}`);
        if (dw) {
          const isTerminal = ['completed','failed','killed'].includes((child.status||'').toLowerCase());
          const hasDismiss = !!dw.querySelector('button');
          if (isTerminal && !hasDismiss)
            dw.innerHTML = `<button class="btn btn-dismiss" onclick="handleDismiss('${child.agentId}')">✕</button>`;
          else if (!isTerminal && hasDismiss)
            dw.innerHTML = '';
        }
      }
    }
  }

  // ── Build a fresh agent card element (first appearance only) ─────────────

  function buildCard(a) {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.id = `card-${a.agentId}`;
    const isActive = (a.status || '').toLowerCase() === 'active';
    card.innerHTML = `
      <div class="agent-row">
        <span class="agent-id">${escHtml(a.agentId)}</span>
        <span class="agent-meta">${escHtml(a.agentType || '—')}</span>
        <span class="status-wrap">${statusBadge(a.status)}</span>
        <span class="agent-meta">${escHtml(a.tenantId || '—')}</span>
        <div class="agent-actions">
          <span class="agent-stale" data-agent="${a.agentId}" id="stale-${a.agentId}"></span>
          <button class="btn btn-events" id="evtbtn-${a.agentId}"
                  onclick="toggleEvents('${a.agentId}')">▼ Events</button>
          ${a.lifecycle === 'long-lived' ? `<button class="btn btn-chat" id="chatbtn-${a.agentId}" onclick="toggleChat('${a.agentId}')">💬 Chat</button>` : ''}
          <span id="killwrap-${a.agentId}">
            ${isActive ? `<button class="btn btn-danger" onclick="handleKill('${a.agentId}')">Kill</button>` : ''}
          </span>
          <span id="dismisswrap-${a.agentId}">
            ${['completed','failed','killed'].includes((a.status||'').toLowerCase()) ? `<button class="btn btn-dismiss" onclick="handleDismiss('${a.agentId}')">✕</button>` : ''}
          </span>
        </div>
      </div>`;
    return card;
  }

  // ── Surgical agent list update — top-level agents only, children nested ──

  function updateAgentList(agents) {
    const list    = document.getElementById('agent-list');
    const countEl = document.getElementById('agent-count');

    for (const a of agents) agentStatus[a.agentId] = a.status;

    const topLevel = agents.filter(a => !a.parentId);
    const childMap = new Map();
    for (const a of agents) {
      if (a.parentId) {
        if (!childMap.has(a.parentId)) childMap.set(a.parentId, []);
        childMap.get(a.parentId).push(a);
      }
    }

    countEl.textContent = `${topLevel.length} agent${topLevel.length !== 1 ? 's' : ''}`;

    if (topLevel.length === 0) {
      if (!list.querySelector('.empty-state')) {
        list.innerHTML = `<div class="empty-state">
          <div class="icon">🤖</div><p>No agents running</p>
          <small>Click "New Agent" to spawn one</small></div>`;
      }
      return;
    }

    const empty = list.querySelector('.empty-state');
    if (empty) list.innerHTML = '';

    for (const a of topLevel) {
      const existing = document.getElementById(`card-${a.agentId}`);
      if (!existing) {
        list.appendChild(buildCard(a));
      } else {
        const sw = existing.querySelector('.status-wrap');
        if (sw && sw.innerHTML !== statusBadge(a.status)) sw.innerHTML = statusBadge(a.status);

        const kw = document.getElementById(`killwrap-${a.agentId}`);
        if (kw) {
          const isActive  = (a.status || '').toLowerCase() === 'active';
          const hasButton = !!kw.querySelector('button');
          if (isActive && !hasButton)
            kw.innerHTML = `<button class="btn btn-danger" onclick="handleKill('${a.agentId}')">Kill</button>`;
          else if (!isActive && hasButton)
            kw.innerHTML = '';
        }
        const dw = document.getElementById(`dismisswrap-${a.agentId}`);
        if (dw) {
          const isTerminal = ['completed','failed','killed'].includes((a.status||'').toLowerCase());
          const hasDismiss = !!dw.querySelector('button');
          if (isTerminal && !hasDismiss)
            dw.innerHTML = `<button class="btn btn-dismiss" onclick="handleDismiss('${a.agentId}')">✕</button>`;
          else if (!isTerminal && hasDismiss)
            dw.innerHTML = '';
        }
      }
      updateChildrenSection(a.agentId, childMap.get(a.agentId) || []);
    }
  }

  // ── Append-only event update — never touches already-rendered rows ────────

  function updateEventPanel(agentId, evts) {
    const panel = document.getElementById(`events-${agentId}`);
    if (!panel) return;

    let listEl = panel.querySelector('.event-list');
    if (!listEl) {
      // First events arriving — replace placeholder. Keep a stable structure:
      // header, logs mount point, then the append-only event list.
      panel.innerHTML = `<div class="event-panel-header">Event Timeline — ${evts.length} event${evts.length !== 1 ? 's' : ''}</div>
        <div class="logs-mount" id="logsmount-${agentId}"></div>
        <div class="event-list"></div>`;
      listEl = panel.querySelector('.event-list');
    }

    const hdr = panel.querySelector('.event-panel-header');
    if (hdr) hdr.textContent = `Event Timeline — ${evts.length} event${evts.length !== 1 ? 's' : ''}`;

    renderLogsEntry(agentId);

    // Track newest event timestamp for the staleness indicator.
    if (Array.isArray(evts) && evts.length) {
      let newest = 0;
      for (const e of evts) {
        const t = e && e.timestamp ? Date.parse(e.timestamp) : NaN;
        if (!isNaN(t) && t > newest) newest = t;
      }
      if (newest > 0 && newest > (lastEventAt[agentId] || 0)) lastEventAt[agentId] = newest;
    }
    refreshStaleness();

    const already = renderedEventCount[agentId] || 0;
    for (const e of evts.slice(already)) {
      const payload = JSON.stringify(e.payload ?? {}, null, 2);
      const typeCls = eventTypeClass(e.type);
      const icon    = eventTypeIcon(e.type);
      const item = document.createElement('div');
      item.className = 'event-item' + (typeCls ? ' ' + typeCls : '');
      item.innerHTML = `<details>
        <summary>
          <span class="event-icon">${escHtml(icon)}</span>
          <span class="event-ts">${fmtTime(e.timestamp)}</span>
          ${sourceBadge(e.source)}
          <span class="event-type">${escHtml(e.type || '')}</span>
        </summary>
        <pre class="event-payload">${escHtml(payload)}</pre>
      </details>`;
      listEl.appendChild(item);
    }
    renderedEventCount[agentId] = evts.length;
  }

  // ── Live container logs ──────────────────────────────────────────────────

  // Render (or refresh) the pinned "container logs" entry at the top of an
  // agent's event panel. Pulses green when the agent is non-terminal.
  function renderLogsEntry(agentId) {
    const panel = document.getElementById(`events-${agentId}`);
    if (!panel) return;
    let mount = document.getElementById(`logsmount-${agentId}`);
    if (!mount) {
      mount = document.createElement('div');
      mount.className = 'logs-mount';
      mount.id = `logsmount-${agentId}`;
      const hdr = panel.querySelector('.event-panel-header');
      if (hdr && hdr.nextSibling) panel.insertBefore(mount, hdr.nextSibling);
      else panel.appendChild(mount);
    }

    const live = !isTerminalStatus(agentStatus[agentId]);
    let entry = document.getElementById(`logsentry-${agentId}`);
    if (!entry) {
      entry = document.createElement('div');
      entry.id = `logsentry-${agentId}`;
      entry.onclick = () => toggleLogs(agentId);
      mount.insertBefore(entry, mount.firstChild);
    }
    entry.className = 'logs-entry' + (live ? ' live' : '');
    const open = logState[agentId] && logState[agentId].open;
    const label = live ? 'live · container logs' : 'container logs';
    entry.innerHTML = `<span class="logs-dot"></span>
      <span class="logs-label">${label}</span>
      <span class="logs-chevron">${open ? '▲' : '▼'}</span>`;
  }

  function toggleLogs(agentId) {
    const st = logState[agentId];
    if (st && st.open) {
      closeLogs(agentId);
      return;
    }
    const mount = document.getElementById(`logsmount-${agentId}`);
    if (!mount) return;

    logState[agentId] = { container: 'agent', lastTs: null, open: true };

    const sub = document.createElement('div');
    sub.className = 'logs-subpanel';
    sub.id = `logsub-${agentId}`;
    sub.innerHTML = `
      <div class="logs-toolbar">
        <span class="logs-seg">
          <button data-c="agent" class="active" onclick="switchLogContainer('${agentId}','agent')">agent</button>
          <button data-c="agent-sidecar" onclick="switchLogContainer('${agentId}','agent-sidecar')">sidecar</button>
        </span>
        <span class="logs-status streaming" id="logstatus-${agentId}">● streaming</span>
      </div>
      <pre class="logs-pre" id="logpre-${agentId}"><span class="logs-waiting">waiting for container…</span></pre>`;
    mount.appendChild(sub);

    renderLogsEntry(agentId);
    startLogStream(agentId, true);
  }

  function closeLogs(agentId) {
    if (logPollers[agentId]) {
      clearInterval(logPollers[agentId]);
      delete logPollers[agentId];
    }
    const sub = document.getElementById(`logsub-${agentId}`);
    if (sub) sub.remove();
    if (logState[agentId]) logState[agentId].open = false;
    renderLogsEntry(agentId);
  }

  function stopLogPoller(agentId) {
    if (logPollers[agentId]) {
      clearInterval(logPollers[agentId]);
      delete logPollers[agentId];
    }
    const sub = document.getElementById(`logsub-${agentId}`);
    if (sub) sub.remove();
    delete logState[agentId];
  }

  function switchLogContainer(agentId, container) {
    const st = logState[agentId];
    if (!st || st.container === container) return;
    st.container = container;
    st.lastTs = null;
    const sub = document.getElementById(`logsub-${agentId}`);
    if (sub) {
      sub.querySelectorAll('.logs-seg button').forEach(b => {
        b.classList.toggle('active', b.getAttribute('data-c') === container);
      });
    }
    const pre = document.getElementById(`logpre-${agentId}`);
    if (pre) pre.innerHTML = '<span class="logs-waiting">waiting for container…</span>';
    const status = document.getElementById(`logstatus-${agentId}`);
    if (status) { status.className = 'logs-status streaming'; status.textContent = '● streaming'; }
    if (logPollers[agentId]) { clearInterval(logPollers[agentId]); delete logPollers[agentId]; }
    startLogStream(agentId, true);
  }

  function appendLogLines(agentId, lines) {
    const pre = document.getElementById(`logpre-${agentId}`);
    if (!pre || !lines || lines.length === 0) return;
    const wait = pre.querySelector('.logs-waiting');
    if (wait) pre.innerHTML = '';
    const nearBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 40;
    let text = '';
    for (const ln of lines) text += escHtml(ln.text || '') + '\n';
    pre.insertAdjacentHTML('beforeend', text);
    if (nearBottom) pre.scrollTop = pre.scrollHeight;
  }

  function setLogStatus(agentId, kind, text) {
    const status = document.getElementById(`logstatus-${agentId}`);
    if (!status) return;
    status.className = `logs-status ${kind}`;
    status.textContent = text;
  }

  async function fetchAndRenderLogBatch(agentId, initial) {
    const st = logState[agentId];
    if (!st) return;
    const container = st.container;
    const data = await fetchLogs(agentId, container, initial ? null : st.lastTs);
    // Bail if container was switched / panel closed mid-request.
    if (!logState[agentId] || logState[agentId].container !== container || !logState[agentId].open) return;
    if (!data) return;

    const lines = Array.isArray(data.lines) ? data.lines : [];
    // Guard against duplicates by tracking lastTs strictly.
    const fresh = st.lastTs ? lines.filter(l => l.ts > st.lastTs) : lines;
    appendLogLines(agentId, fresh);
    if (fresh.length > 0) st.lastTs = fresh[fresh.length - 1].ts;

    if (lines.length === 0 && data.podPhase && data.podPhase !== 'Running') {
      const pre = document.getElementById(`logpre-${agentId}`);
      if (pre && !pre.textContent.trim()) {
        pre.innerHTML = `<span class="logs-waiting">waiting for container… (${escHtml(data.podPhase)})</span>`;
      }
    }

    return data;
  }

  async function startLogStream(agentId, initial) {
    const data = await fetchAndRenderLogBatch(agentId, initial);
    if (!logState[agentId] || !logState[agentId].open) return;

    const terminal = (data && data.complete) || isTerminalStatus(agentStatus[agentId]);
    if (terminal) {
      // One final fetch to flush any remaining lines, then stop.
      await fetchAndRenderLogBatch(agentId, false);
      const st = (agentStatus[agentId] || 'completed').toLowerCase();
      setLogStatus(agentId, 'ended', `stream ended (${st})`);
      if (logPollers[agentId]) { clearInterval(logPollers[agentId]); delete logPollers[agentId]; }
      return;
    }

    if (!logPollers[agentId]) {
      logPollers[agentId] = setInterval(() => pollLogStream(agentId), POLL_MS);
    }
  }

  async function pollLogStream(agentId) {
    if (!logState[agentId] || !logState[agentId].open) return;
    const data = await fetchAndRenderLogBatch(agentId, false);
    if (!logState[agentId] || !logState[agentId].open) return;
    const terminal = (data && data.complete) || isTerminalStatus(agentStatus[agentId]);
    if (terminal) {
      await fetchAndRenderLogBatch(agentId, false);
      const st = (agentStatus[agentId] || 'completed').toLowerCase();
      setLogStatus(agentId, 'ended', `stream ended (${st})`);
      if (logPollers[agentId]) { clearInterval(logPollers[agentId]); delete logPollers[agentId]; }
    }
  }

  // ── Toggle events panel — direct DOM, no full re-render ──────────────────

  function toggleEvents(agentId) {
    const card = document.getElementById(`card-${agentId}`);
    const btn  = document.getElementById(`evtbtn-${agentId}`);
    if (!card || !btn) return;

    if (expandedAgents.has(agentId)) {
      expandedAgents.delete(agentId);
      clearInterval(agentEventPollers[agentId]);
      delete agentEventPollers[agentId];
      delete renderedEventCount[agentId];
      stopLogPoller(agentId);
      const panel = document.getElementById(`events-${agentId}`);
      if (panel) panel.remove();
      btn.textContent = '▼ Events';
      btn.classList.remove('active');
    } else {
      expandedAgents.add(agentId);
      btn.textContent = '▲ Events';
      btn.classList.add('active');

      const panel = document.createElement('div');
      panel.className = 'event-panel';
      panel.id = `events-${agentId}`;
      panel.innerHTML = `<div class="event-panel-header">Event Timeline</div>
        <div class="no-events">Loading…</div>`;
      card.appendChild(panel);

      fetchEvents(agentId).then(evts => updateEventPanel(agentId, evts));
      agentEventPollers[agentId] = setInterval(async () => {
        updateEventPanel(agentId, await fetchEvents(agentId));
      }, POLL_MS);
    }
  }

  function toggleChat(agentId) {
    const card = document.getElementById(`card-${agentId}`);
    const btn  = document.getElementById(`chatbtn-${agentId}`);
    if (!card || !btn) return;

    if (expandedChats.has(agentId)) {
      expandedChats.delete(agentId);
      const panel = document.getElementById(`chat-${agentId}`);
      if (panel) panel.remove();
      btn.textContent = '💬 Chat';
      btn.classList.remove('active');
    } else {
      expandedChats.add(agentId);
      btn.textContent = '💬 Close Chat';
      btn.classList.add('active');

      const panel = document.createElement('div');
      panel.className = 'chat-panel';
      panel.id = `chat-${agentId}`;
      panel.innerHTML = `
        <div class="chat-panel-header">Chat</div>
        <div class="chat-log" id="chatlog-${agentId}"></div>
        <div class="chat-input-row">
          <input id="chatinput-${agentId}" type="text" placeholder="Type a message…"
                 onkeydown="if(event.key==='Enter') handleChatSend('${agentId}')" />
          <button class="btn btn-chat" onclick="handleChatSend('${agentId}')">Send</button>
        </div>`;
      card.appendChild(panel);

      renderChatHistory(agentId);
      document.getElementById(`chatinput-${agentId}`)?.focus();
    }
  }

  function renderChatHistory(agentId) {
    const log = document.getElementById(`chatlog-${agentId}`);
    if (!log) return;
    log.innerHTML = '';
    for (const msg of (chatHistory[agentId] || [])) {
      const div = document.createElement('div');
      div.className = `chat-msg ${msg.role}`;
      div.textContent = msg.text;
      log.appendChild(div);
    }
    log.scrollTop = log.scrollHeight;
  }

  function appendChatMsg(agentId, role, text) {
    if (!chatHistory[agentId]) chatHistory[agentId] = [];
    chatHistory[agentId].push({ role, text });
    const log = document.getElementById(`chatlog-${agentId}`);
    if (!log) return;
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  // Transient "agent is typing" bubble — not stored in chatHistory, so it never
  // survives a re-render and is removed once the reply (or error) arrives.
  function showTyping(agentId) {
    const log = document.getElementById(`chatlog-${agentId}`);
    if (!log || document.getElementById(`typing-${agentId}`)) return;
    const div = document.createElement('div');
    div.className = 'chat-msg agent typing';
    div.id = `typing-${agentId}`;
    div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function hideTyping(agentId) {
    document.getElementById(`typing-${agentId}`)?.remove();
  }

  async function handleChatSend(agentId) {
    const input = document.getElementById(`chatinput-${agentId}`);
    if (!input) return;
    const msg = input.value.trim();
    if (!msg) return;
    const btn = input.parentElement?.querySelector('button');
    input.value = '';
    appendChatMsg(agentId, 'user', msg);

    // Lock the controls and show the typing indicator while the LLM works.
    input.disabled = true;
    if (btn) btn.disabled = true;
    showTyping(agentId);

    try {
      const result = await sendMessage(agentId, msg);
      // Flue webhook agents wrap the handler return in { result, _meta }; other
      // agents may reply with { response } directly. Unwrap either shape.
      const reply = result?.result?.response ?? result?.response ?? JSON.stringify(result);
      appendChatMsg(agentId, 'agent', reply);
    } catch (e) {
      appendChatMsg(agentId, 'agent', `[Error: ${e.message}]`);
    } finally {
      hideTyping(agentId);
      input.disabled = false;
      if (btn) btn.disabled = false;
      input.focus();
    }
  }

  // ── Kill handler ─────────────────────────────────────────────────────────

  async function handleKill(agentId) {
    try {
      await killAgent(agentId);
      showToast(`Agent ${agentId} terminated`);
      clearInterval(agentEventPollers[agentId]);
      delete agentEventPollers[agentId];
      expandedAgents.delete(agentId);
      delete renderedEventCount[agentId];
      stopLogPoller(agentId);
      const panel = document.getElementById(`events-${agentId}`);
      if (panel) panel.remove();
      expandedChats.delete(agentId);
      delete chatHistory[agentId];
      const chatPanel = document.getElementById(`chat-${agentId}`);
      if (chatPanel) chatPanel.remove();
    } catch (e) {
      showToast(`Error: ${e.message}`, true);
    }
  }

  async function handleDismiss(agentId) {
    try {
      await dismissAgent(agentId);
      clearInterval(agentEventPollers[agentId]);
      delete agentEventPollers[agentId];
      expandedAgents.delete(agentId);
      delete renderedEventCount[agentId];
      stopLogPoller(agentId);
      delete agentStatus[agentId];
      delete lastEventAt[agentId];
      expandedChats.delete(agentId);
      delete chatHistory[agentId];
      const card = document.getElementById(`card-${agentId}`);
      if (card) card.remove();
      showToast(`Agent ${agentId.slice(0,8)}… dismissed`);
    } catch (e) {
      showToast(`Error: ${e.message}`, true);
    }
  }

  // ── Spawn modal ──────────────────────────────────────────────────────────

  document.getElementById('open-modal-btn').addEventListener('click', () => {
    document.getElementById('spawn-modal').classList.add('open');
    document.getElementById('f-task').focus();
  });
  document.getElementById('close-modal-btn').addEventListener('click', closeModal);
  document.getElementById('spawn-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  function closeModal() {
    document.getElementById('spawn-modal').classList.remove('open');
  }

  document.getElementById('spawn-btn').addEventListener('click', async () => {
    const agentType = document.getElementById('f-type').value.trim() || 'worker';
    const userId    = document.getElementById('f-user').value.trim() || 'user-1';
    const tenantId  = document.getElementById('f-tenant').value.trim() || 'tenant-1';
    const task      = document.getElementById('f-task').value.trim();

    const btn = document.getElementById('spawn-btn');
    btn.disabled = true; btn.textContent = 'Spawning…';
    try {
      const result = await spawnAgent({ agentType, userId, tenantId, ...(task && { task }) });
      showToast(`Spawned: ${result.workloadName || 'agent'}`);
      closeModal();
      document.getElementById('f-task').value = '';
    } catch (e) {
      showToast(`Spawn failed: ${e.message}`, true);
    } finally {
      btn.disabled = false; btn.textContent = 'Spawn';
    }
  });

  // ── Toast ────────────────────────────────────────────────────────────────

  let toastTimer = null;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background   = isError ? '#4a1010' : '#1e3a5f';
    t.style.borderColor  = isError ? '#c0392b' : 'var(--border)';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Main poll loop ───────────────────────────────────────────────────────

  async function poll() {
    try { updateAgentList(await fetchAgents()); } catch (_) {}
    try { refreshStaleness(); } catch (_) {}
  }

  poll();
  setInterval(poll, POLL_MS);
  // Keep the "Xs ago" labels live between polls; relabels DOM, never rebuilds.
  setInterval(() => { try { refreshStaleness(); } catch (_) {} }, 1000);
  fetchTemplates().then(types => {
    if (!Array.isArray(types) || types.length === 0) return;
    const sel = document.getElementById('f-type');
    if (!sel || sel.tagName !== 'SELECT') return;
    sel.innerHTML = types.map(t =>
      `<option value="${escHtml(t)}"${t === 'worker' ? ' selected' : ''}>${escHtml(t)}</option>`
    ).join('');
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
