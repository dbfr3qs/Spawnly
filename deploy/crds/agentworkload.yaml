apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentworkloads.agent-platform.io
spec:
  group: agent-platform.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [agentType, userId, tenantId]
              properties:
                agentType:
                  type: string
                userId:
                  type: string
                tenantId:
                  type: string
                lifecycle:
                  type: string
                  enum: [short-lived, long-lived]
                task:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                podName:
                  type: string
                agentId:
                  type: string
  scope: Namespaced
  names:
    plural: agentworkloads
    singular: agentworkload
    kind: AgentWorkload
    shortNames: [aw]
