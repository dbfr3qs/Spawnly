apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: agent-orchestrator
      containers:
        - name: orchestrator
          image: agent-orchestrator:latest
          imagePullPolicy: Never
          env:
            - name: SPICEDB_ENDPOINT
              value: "spicedb:50051"
            - name: SPICEDB_PSK
              value: "poc-secret"
            - name: REGISTRY_URL
              value: "http://registry:8080"
            # IdentityServer issuer + JWKS for validating agent spawn tokens
            # (buildSpawnValidator). The Service listens on :8080 — without the
            # explicit port the code default (:80) has no Service route, so the
            # orchestrator wedges in its JWKS retry loop and never serves /spawn.
            - name: IS_ISSUER
              value: "http://identity-server:8080"
            - name: IS_JWKS_URL
              value: "http://identity-server:8080/.well-known/openid-configuration/jwks"
            # Control-plane auth the orchestrator presents to the registry's
            # template + consent endpoints; must match the registry's setting.
            # Both values come from the optional `control-plane-auth` Secret that
            # bootstrap.sh generates (shared with the registry, so the tokens
            # match by construction). Absent Secret → env unset → "none" (sends
            # no credential, demo). For "oidc" instead, drop the secretKeyRefs,
            # set CONTROL_PLANE_AUTH=oidc, and uncomment the client-credentials
            # block (the "orchestrator" IdP client).
            - name: CONTROL_PLANE_AUTH
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: auth
                  optional: true
            - name: CONTROL_PLANE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: token
                  optional: true
            # --- oidc tier ---
            # - name: CONTROL_PLANE_TOKEN_URL
            #   value: "http://identity-server:8080/connect/token"
            # - name: CONTROL_PLANE_CLIENT_ID
            #   value: "orchestrator"
            # - name: CONTROL_PLANE_CLIENT_SECRET
            #   value: "orchestrator-secret"
            # - name: CONTROL_PLANE_SCOPE
            #   value: "registry.consent"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: default
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8080
      targetPort: 8080
