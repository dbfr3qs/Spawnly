apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: agent-orchestrator
      containers:
        - name: orchestrator
          image: agent-orchestrator:latest
          imagePullPolicy: Never
          env:
            - name: SPICEDB_ENDPOINT
              value: "spicedb:50051"
            - name: SPICEDB_PSK
              value: "poc-secret"
            - name: REGISTRY_URL
              value: "http://registry:8080"
            # Control-plane auth the orchestrator presents to the registry's
            # consent endpoints; must match the registry's CONTROL_PLANE_AUTH.
            # "none" sends no credential (demo). For "shared-secret" set
            # CONTROL_PLANE_TOKEN; for "oidc" uncomment the client-credentials
            # block (the "orchestrator" IdP client).
            - name: CONTROL_PLANE_AUTH
              value: "none"
            # - name: CONTROL_PLANE_TOKEN            # shared-secret tier
            #   value: "change-me"
            # --- oidc tier ---
            # - name: CONTROL_PLANE_TOKEN_URL
            #   value: "http://identity-server:8080/connect/token"
            # - name: CONTROL_PLANE_CLIENT_ID
            #   value: "orchestrator"
            # - name: CONTROL_PLANE_CLIENT_SECRET
            #   value: "orchestrator-secret"
            # - name: CONTROL_PLANE_SCOPE
            #   value: "registry.consent"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: default
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8080
      targetPort: 8080
