apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: agent-orchestrator
      containers:
        - name: orchestrator
          image: agent-orchestrator:latest
          imagePullPolicy: Never
          env:
            - name: SPICEDB_ENDPOINT
              value: "spicedb:50051"
            - name: SPICEDB_PSK
              value: "poc-secret"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: default
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8080
      targetPort: 8080
