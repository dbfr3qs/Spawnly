apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: agent-registry:latest
          imagePullPolicy: Never
          env:
            - name: SPICEDB_ENDPOINT
              value: "spicedb:50051"
            - name: SPICEDB_PSK
              value: "poc-secret"
            - name: SPIRE_JWKS_URL
              value: "https://spire-spiffe-oidc-discovery-provider.spire-system/keys"
            # Control-plane auth for the template + consent-lifecycle endpoints.
            # Both values come from the optional `control-plane-auth` Secret,
            # which bootstrap.sh generates (auth=shared-secret + a random token).
            # When the Secret is absent (a raw `kubectl apply` with no bootstrap)
            # the env is unset and the registry falls back to "none" — open, for
            # the demo. For "oidc" instead, drop the secretKeyRefs, set
            # CONTROL_PLANE_AUTH=oidc, and uncomment the JWKS/audience/scope below.
            - name: CONTROL_PLANE_AUTH
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: auth
                  optional: true
            - name: CONTROL_PLANE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: token
                  optional: true
            # --- oidc tier ---
            # - name: CONTROL_PLANE_OIDC_JWKS_URL
            #   value: "http://identity-server:8080/.well-known/openid-configuration/jwks"
            # - name: CONTROL_PLANE_OIDC_AUDIENCE
            #   value: "registry"
            # - name: CONTROL_PLANE_OIDC_SCOPE
            #   value: "registry.consent"
          ports:
            - containerPort: 8080
          # The registry binds :8080 only AFTER it writes its SpiceDB schema on
          # startup (which retries until SpiceDB is reachable — up to ~30s). Without
          # a probe the pod reports Ready the instant the process starts, so
          # `kubectl rollout status` returns and seeding races a not-yet-listening
          # server (connection refused). A TCP probe on 8080 makes Ready mean
          # "actually serving."
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: default
spec:
  selector:
    app: registry
  ports:
    - port: 8080
      targetPort: 8080
