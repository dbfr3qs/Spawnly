apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: agent-registry:latest
          imagePullPolicy: Never
          env:
            - name: SPICEDB_ENDPOINT
              value: "spicedb:50051"
            - name: SPICEDB_PSK
              value: "poc-secret"
            - name: SPIRE_JWKS_URL
              value: "https://spire-spiffe-oidc-discovery-provider.spire-system/keys"
            # Control-plane auth for the consent-lifecycle endpoints. "none"
            # runs them open (demo, behind cluster network isolation). For a
            # SaaS deployment set "shared-secret" (+ CONTROL_PLANE_TOKEN) or
            # "oidc" and uncomment the JWKS/audience/scope below — the value
            # must match what the orchestrator and identity-server present.
            - name: CONTROL_PLANE_AUTH
              value: "none"
            # - name: CONTROL_PLANE_TOKEN            # shared-secret tier
            #   value: "change-me"
            # --- oidc tier ---
            # - name: CONTROL_PLANE_OIDC_JWKS_URL
            #   value: "http://identity-server:8080/.well-known/openid-configuration/jwks"
            # - name: CONTROL_PLANE_OIDC_AUDIENCE
            #   value: "registry"
            # - name: CONTROL_PLANE_OIDC_SCOPE
            #   value: "registry.consent"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: default
spec:
  selector:
    app: registry
  ports:
    - port: 8080
      targetPort: 8080
