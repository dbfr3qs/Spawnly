# Base kustomization for the platform manifests.
#
# Exists so out-of-repo overlays (e.g. the private AWS deploy in spawnly-infra)
# can consume this directory as a pinned remote kustomize base:
#   resources:
#     - github.com/dbfr3qs/Spawnly/deploy/manifests?ref=main
# Resources are listed by relative path (no parent-escaping) so the remote base
# builds without needing LoadRestrictionsNone.
#
# Order mirrors scripts/bootstrap.sh: RBAC and SpiceDB first, then the control
# plane, sample APIs, and the ingress NetworkPolicies last.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - rbac.yaml
  - spicedb.yaml
  - registry.yaml
  - identityserver.yaml
  - orchestrator.yaml
  - operator.yaml
  - dashboard.yaml
  - mobile-gateway.yaml
  - sample-api-a.yaml
  - sample-api-b.yaml
  - travel-tools.yaml
  - networkpolicy.yaml
