apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-gateway
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile-gateway
  template:
    metadata:
      labels:
        app: mobile-gateway
    spec:
      containers:
        - name: mobile-gateway
          image: agent-mobile-gateway:latest
          imagePullPolicy: Never
          env:
            # The gateway proxies consent actions to the orchestrator's
            # user-scoped endpoints (which stay the authorization authority).
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator:8080"
            # Same IdP issuer + JWKS the orchestrator validates mobile/dashboard
            # access tokens with. The explicit :8080 matters — the Service has no
            # :80 route, so the bare default would wedge the JWKS retry loop.
            - name: IS_ISSUER
              value: "http://identity-server:8080"
            - name: IS_JWKS_URL
              value: "http://identity-server:8080/.well-known/openid-configuration/jwks"
            # The mobile access token carries aud=orchestrator and the same
            # read/write scopes the dashboard uses (it calls the orchestrator's
            # consent endpoints), so the gateway validates against those.
            - name: SPAWN_OIDC_AUDIENCE
              value: "orchestrator"
            # Background-push transport. dev = SSE only, zero cloud credentials
            # (the local/bootstrap default). fcmapns (Phase 3) for real push.
            - name: NOTIFIER
              value: "dev"
            # Control-plane auth for the inbound /internal/notify webhook (the
            # caller is the registry). Same `control-plane-auth` Secret the
            # registry/orchestrator use, so the shared secret matches by
            # construction. Absent Secret → env unset → "none" (open, demo).
            - name: CONTROL_PLANE_AUTH
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: auth
                  optional: true
            - name: CONTROL_PLANE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: token
                  optional: true
          ports:
            - name: public
              containerPort: 8080
            - name: internal
              containerPort: 8081
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-gateway
  namespace: default
spec:
  selector:
    app: mobile-gateway
  ports:
    # Public, user-facing surface (the ALB / port-forward targets this).
    - name: public
      port: 8080
      targetPort: 8080
    # Internal control-plane webhook (/internal/notify). NetworkPolicy restricts
    # ingress on this port to the registry; the ALB never targets it.
    - name: internal
      port: 8081
      targetPort: 8081
