apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-server
  template:
    metadata:
      labels:
        app: identity-server
    spec:
      containers:
        - name: identity-server
          image: agent-identity-server:latest
          imagePullPolicy: Never
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: SPIRE_JWKS_URL
              value: "https://spire-spiffe-oidc-discovery-provider.spire-system/keys"
            - name: REGISTRY_URL
              value: "http://registry:8080"
            # Token issuer — the in-cluster identity-server URL the resource
            # servers validate against. Applies to agent tokens AND human
            # id_tokens; it is deliberately NOT the browser origin.
            - name: ISSUER_URI
              value: "http://identity-server:8080"
            # Browser origin for the interactive `dashboard` client's redirect /
            # post-logout URIs (the dashboard proxies the OIDC endpoints).
            - name: DASHBOARD_ORIGIN
              value: "http://localhost:8090"
            # Secret for the interactive `dashboard` OIDC client (demo value;
            # the dashboard presents the matching OIDC_CLIENT_SECRET).
            - name: DASHBOARD_CLIENT_SECRET
              value: "dashboard-secret"
            # Interactive login credential, from the optional `dashboard-user`
            # Secret. Local kind: alice/alice (scripts/bootstrap.sh). Public AWS:
            # a strong generated password. Absent Secret →
            # env unset → NO interactive user (login disabled), so a public deploy
            # never ships a guessable default.
            - name: DASHBOARD_USER
              valueFrom:
                secretKeyRef:
                  name: dashboard-user
                  key: username
                  optional: true
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashboard-user
                  key: password
                  optional: true
            # Optional NON-ADMIN (viewer) login, from the same `dashboard-user`
            # Secret. Absent keys ⇒ env unset ⇒ NO viewer user (fail closed),
            # exactly like DASHBOARD_USER/PASSWORD above. Local kind sets
            # viewer/viewer (scripts/bootstrap.sh); the public AWS deploy leaves
            # it unset so it ships no guessable non-admin login. The viewer
            # carries no `role` claim, so it exercises authz-deny paths.
            - name: DASHBOARD_VIEWER_USER
              valueFrom:
                secretKeyRef:
                  name: dashboard-user
                  key: viewerUsername
                  optional: true
            - name: DASHBOARD_VIEWER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashboard-user
                  key: viewerPassword
                  optional: true
            # Control-plane auth the IdP's CIBA driver presents to the registry's
            # consent endpoints; must match the registry's setting. Both values
            # come from the optional `control-plane-auth` Secret that bootstrap.sh
            # generates (shared with the registry, so the tokens match by
            # construction). Absent Secret → env unset → "none" (sends no
            # credential, demo). For "oidc" instead, drop the secretKeyRefs, set
            # CONTROL_PLANE_AUTH=oidc, uncomment the client-credentials block (the
            # "idp-consent" client), and set IDP_CONSENT_CLIENT_SECRET to match.
            - name: CONTROL_PLANE_AUTH
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: auth
                  optional: true
            - name: CONTROL_PLANE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: token
                  optional: true
            # --- oidc tier ---
            # - name: CONTROL_PLANE_TOKEN_URL
            #   value: "http://identity-server:8080/connect/token"
            # - name: CONTROL_PLANE_CLIENT_ID
            #   value: "idp-consent"
            # - name: CONTROL_PLANE_CLIENT_SECRET
            #   value: "idp-consent-secret"
            # - name: IDP_CONSENT_CLIENT_SECRET      # server-side hash of the above
            #   value: "idp-consent-secret"
            # - name: CONTROL_PLANE_SCOPE
            #   value: "registry.consent"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: identity-server
  namespace: default
spec:
  selector:
    app: identity-server
  ports:
    - port: 8080
      targetPort: 8080
