apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-server
  template:
    metadata:
      labels:
        app: identity-server
    spec:
      containers:
        - name: identity-server
          image: agent-identity-server:latest
          imagePullPolicy: Never
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: SPIRE_JWKS_URL
              value: "http://spire-spiffe-oidc-discovery-provider.spire-system/.well-known/jwks.json"
            - name: REGISTRY_URL
              value: "http://registry:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: identity-server
  namespace: default
spec:
  selector:
    app: identity-server
  ports:
    - port: 8080
      targetPort: 8080
