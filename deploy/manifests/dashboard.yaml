apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: agent-dashboard:latest
          imagePullPolicy: Never
          env:
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator:8080"
            # OIDC relying-party config. OIDC_AUTHORITY is the browser-facing
            # origin (== IdentityServer ISSUER_URI); IDENTITY_INTERNAL_URL is the
            # in-cluster back-channel to identity-server.
            - name: OIDC_AUTHORITY
              value: "http://localhost:8090"
            - name: IDENTITY_INTERNAL_URL
              value: "http://identity-server:8080"
            - name: OIDC_CLIENT_ID
              value: "dashboard"
            - name: OIDC_CLIENT_SECRET
              value: "dashboard-secret"
            # Header "Docs" link target. Local dev runs the docs site on :4321;
            # the AWS deploy.sh overrides this to the public docs origin.
            - name: DOCS_URL
              value: "http://localhost:4321"
            # Control-plane auth the dashboard presents to the orchestrator's
            # dashboard /spawn path (X-Control-Plane-Token). Both values come from
            # the optional `control-plane-auth` Secret bootstrap.sh generates
            # (shared with the orchestrator, so the tokens match by construction).
            # Absent Secret → env unset → "none" (sends an empty token, demo).
            - name: CONTROL_PLANE_AUTH
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: auth
                  optional: true
            - name: CONTROL_PLANE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: control-plane-auth
                  key: token
                  optional: true
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: default
spec:
  selector:
    app: dashboard
  ports:
    - port: 8080
      targetPort: 8080
