apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: agent-dashboard:latest
          imagePullPolicy: Never
          env:
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator:8080"
            # OIDC relying-party config. OIDC_AUTHORITY is the browser-facing
            # origin (== IdentityServer ISSUER_URI); IDENTITY_INTERNAL_URL is the
            # in-cluster back-channel to identity-server.
            - name: OIDC_AUTHORITY
              value: "http://localhost:8090"
            - name: IDENTITY_INTERNAL_URL
              value: "http://identity-server:8080"
            - name: OIDC_CLIENT_ID
              value: "dashboard"
            - name: OIDC_CLIENT_SECRET
              value: "dashboard-secret"
            # Header "Docs" link target. Local dev runs the docs site on :4321;
            # the AWS deploy.sh overrides this to the public docs origin.
            - name: DOCS_URL
              value: "http://localhost:4321"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: default
spec:
  selector:
    app: dashboard
  ports:
    - port: 8080
      targetPort: 8080
