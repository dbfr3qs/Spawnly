apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-tools
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-tools
  template:
    metadata:
      labels:
        app: travel-tools
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: travel-tools
          image: agent-travel-tools:latest
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # OAuth protected-resource config. The MCP server validates every
            # Spawnly access token against the IdP JWKS and requires aud to
            # contain RESOURCE_AUDIENCE; per-tool scope is enforced per request.
            - name: IS_ISSUER
              value: "http://identity-server:8080"
            - name: IS_JWKS_URL
              value: "http://identity-server:8080/.well-known/openid-configuration/jwks"
            - name: RESOURCE_AUDIENCE
              value: "travel-tools"
            - name: PORT
              value: "8080"
            # Upstream provider keys for the tools — from the dedicated
            # travel-tools-secrets Secret (bootstrap.sh / deploy.sh create it from
            # mcp/travel-tools/.env). optional:true so a missing key just disables
            # that one tool (it reports "not configured"); the server still serves
            # the others. These keys are scoped to this Deployment only — never an
            # agent. search_flights → Duffel; search_hotels → LiteAPI; currency
            # (Frankfurter) needs none.
            - name: DUFFEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: travel-tools-secrets
                  key: DUFFEL_API_KEY
                  optional: true
            - name: LITEAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: travel-tools-secrets
                  key: LITEAPI_KEY
                  optional: true
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: travel-tools
  namespace: default
spec:
  selector:
    app: travel-tools
  ports:
    # port 80 matches the other in-cluster services (sample-api*), so agents dial
    # http://travel-tools/mcp; targetPort is the container's 8080.
    - port: 80
      targetPort: 8080
