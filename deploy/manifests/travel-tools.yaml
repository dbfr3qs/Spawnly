apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-tools
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-tools
  template:
    metadata:
      labels:
        app: travel-tools
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: travel-tools
          image: agent-travel-tools:latest
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # OAuth protected-resource config. The MCP server validates every
            # Spawnly access token against the IdP JWKS and requires aud to
            # contain RESOURCE_AUDIENCE; per-tool scope is enforced per request.
            - name: IS_ISSUER
              value: "http://identity-server:8080"
            - name: IS_JWKS_URL
              value: "http://identity-server:8080/.well-known/openid-configuration/jwks"
            - name: RESOURCE_AUDIENCE
              value: "travel-tools"
            - name: PORT
              value: "8080"
            # Phase 2 adds DUFFEL_API_TOKEN / AMADEUS_* from secrets here.
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: travel-tools
  namespace: default
spec:
  selector:
    app: travel-tools
  ports:
    # port 80 matches the other in-cluster services (sample-api*), so agents dial
    # http://travel-tools/mcp; targetPort is the container's 8080.
    - port: 80
      targetPort: 8080
