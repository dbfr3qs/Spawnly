# AWS-STS deploy overlay. Deploys the platform on EKS with the AWS-STS attestor
# instead of SPIRE: no SPIRE/CSI components, ATTESTOR=aws-sts on the identity
# touchpoints, and the IRSA-annotated agent ServiceAccount.
#
# Usage:
#   1. terraform apply (deploy/aws/terraform) — note agent_role_arn, ecr_registry.
#   2. Set the SA annotation: edit serviceaccount.yaml with the agent_role_arn.
#   3. Point images at ECR, e.g.:
#        kustomize edit set image \
#          agent-registry=$ECR/agent-registry:latest \
#          agent-orchestrator=$ECR/agent-orchestrator:latest \
#          agent-operator=$ECR/agent-operator:latest \
#          agent-dashboard=$ECR/agent-dashboard:latest \
#          agent-identity-server=$ECR/agent-identity-server:latest \
#          agent-sidecar=$ECR/agent-sidecar:latest
#   4. kubectl kustomize --load-restrictor LoadRestrictionsNone deploy/aws | kubectl apply -f -
#      (kubectl apply -k does NOT accept --load-restrictor; build then pipe.
#       The flag is required because this overlay references ../manifests.)
#
# Set AWS_REGION below to match your terraform region.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../crds/agentworkload.yaml
  - ../manifests/rbac.yaml
  - ../manifests/spicedb.yaml
  - ../manifests/registry.yaml
  - ../manifests/identityserver.yaml
  - ../manifests/orchestrator.yaml
  - ../manifests/operator.yaml
  - ../manifests/dashboard.yaml
  - ../manifests/mobile-gateway.yaml
  - ../manifests/sample-api-a.yaml
  - ../manifests/sample-api-b.yaml
  - ../manifests/travel-tools.yaml
  # Ingress NetworkPolicies (enforced by the AWS VPC CNI network-policy
  # controller when enabled on the addon; see the manifest header).
  - ../manifests/networkpolicy.yaml
# Note: the agent ServiceAccount (with its real IAM role ARN) and the
# ai-provider / control-plane-auth secrets are created by deploy/aws/deploy.sh
# from your environment — NOT included here, so a re-apply can't clobber the
# real role-arn annotation with the placeholder.

patches:
  # Operator: select the AWS injector + region for STS endpoint resolution.
  - target:
      kind: Deployment
      name: agent-operator
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ATTESTOR
          value: aws-stsweb
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_REGION
          value: us-east-1
  # Registry: ATTESTOR drives the registrant verifier to aws-stsweb.
  # (deploy.sh adds the dynamic STSWEB_ISSUER/AUDIENCE/NAMESPACE/SA/CLUSTER_ARN.)
  - target:
      kind: Deployment
      name: registry
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ATTESTOR
          value: aws-stsweb
  # IdentityServer: verify the web-identity JWT (deploy.sh adds STSWEB_* env).
  - target:
      kind: Deployment
      name: identity-server
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ATTESTOR
          value: aws-stsweb
  # mobile-gateway: switch to real push (NOTIFIER=fcmapns) and mount the FCM
  # service-account JSON + APNs .p8 from the `mobile-push-credentials` Secret.
  # That Secret is created by deploy.sh from the operator's environment (like the
  # ai-provider / control-plane-auth secrets) and is NEVER committed or imaged.
  # The APNs identifiers (key id / team id / bundle id, production flag) are
  # non-secret and come from the same Secret for one source of truth.
  - target:
      kind: Deployment
      name: mobile-gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mobile-gateway
      spec:
        template:
          spec:
            containers:
              - name: mobile-gateway
                env:
                  - name: NOTIFIER
                    value: fcmapns
                  - name: FCM_SERVICE_ACCOUNT_FILE
                    value: /etc/mobile-push/fcm-service-account.json
                  - name: APNS_KEY_FILE
                    value: /etc/mobile-push/apns-key.p8
                  - name: APNS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: mobile-push-credentials
                        key: apns-key-id
                  - name: APNS_TEAM_ID
                    valueFrom:
                      secretKeyRef:
                        name: mobile-push-credentials
                        key: apns-team-id
                  - name: APNS_BUNDLE_ID
                    valueFrom:
                      secretKeyRef:
                        name: mobile-push-credentials
                        key: apns-bundle-id
                  - name: APNS_PRODUCTION
                    value: "true"
                volumeMounts:
                  - name: push-creds
                    mountPath: /etc/mobile-push
                    readOnly: true
            volumes:
              - name: push-creds
                secret:
                  secretName: mobile-push-credentials
                  items:
                    - key: fcm-service-account.json
                      path: fcm-service-account.json
                    - key: apns-key.p8
                      path: apns-key.p8
