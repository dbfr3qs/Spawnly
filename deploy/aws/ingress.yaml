# Public ingress: one internet-facing ALB (via the AWS Load Balancer Controller)
# routing by host to the dashboard and IdentityServer over HTTPS. external-dns
# creates the spawnly.run / auth.spawnly.run records from these rule hosts.
#
# Applied by deploy.sh only when the DNS root is set up (it injects the ACM
# certificate-arn from deploy/aws/dns output). Not part of the kustomize overlay,
# so a non-public AWS deploy doesn't provision an ALB.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spawnly
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # alb.ingress.kubernetes.io/certificate-arn is injected by deploy.sh from the
    # deploy/aws/dns ACM output.
spec:
  ingressClassName: alb
  rules:
    - host: spawnly.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 8080
    - host: auth.spawnly.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: identity-server
                port:
                  number: 8080
