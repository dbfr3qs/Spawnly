# Public ingress: one internet-facing ALB (via the AWS Load Balancer Controller)
# routing by host to the dashboard and IdentityServer over HTTPS. external-dns
# creates the spawnly.run / auth.spawnly.run records from these rule hosts.
#
# Applied by deploy.sh only when the DNS root is set up (it injects the ACM
# certificate-arn from deploy/aws/dns output). Not part of the kustomize overlay,
# so a non-public AWS deploy doesn't provision an ALB.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spawnly
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # deploy.sh substitutes ${CERT_ARN} (from the deploy/aws/dns ACM output) before
    # a single apply, so the object is complete on the controller's first reconcile.
    alb.ingress.kubernetes.io/certificate-arn: "${CERT_ARN}"
spec:
  ingressClassName: alb
  rules:
    - host: spawnly.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 8080
    - host: auth.spawnly.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: identity-server
                port:
                  number: 8080
    # The mobile app's public origin. Routes ONLY to the gateway's public port
    # (8080: /me/* + SSE); the internal webhook port (8081) is never exposed.
    # Requires the ACM cert to cover mobile.spawnly.run (add it to the SANs in
    # deploy/aws/dns); external-dns creates the record from this host rule.
    - host: mobile.spawnly.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mobile-gateway
                port:
                  number: 8080
