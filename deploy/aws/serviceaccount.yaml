# ServiceAccount that agent pods run as under the AWS-STS attestor. The IRSA
# annotation binds it to the agent IAM role from Terraform (agent_role_arn
# output); the EKS IRSA webhook then injects AWS_ROLE_ARN + the projected
# web-identity token into agent pods. Replace the annotation value with the
# terraform output before applying:
#   eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/spawnly-agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spawnly-agent
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_terraform_output_agent_role_arn
