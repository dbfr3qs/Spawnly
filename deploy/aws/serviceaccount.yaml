# ServiceAccount that agent pods run as. Under the aws-stsweb attestor the
# binding to the IAM role is via an EKS Pod Identity association (managed in
# Terraform: aws_eks_pod_identity_association) — NOT an IRSA annotation. EKS
# injects the AWS credentials and stamps the cluster-attested session tags
# (kubernetes-pod-name, ...). deploy.sh creates this SA; it's kept here for
# reference and must match terraform var.agent_service_account.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spawnly-agent
  namespace: default
